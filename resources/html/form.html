<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <script type="module"
            src="https://cdn.jsdelivr.net/gh/starfederation/datastar@v1.0.1/bundles/datastar.js"></script>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 32rem; margin: 3rem auto; line-height: 1.5; }
      .field { display: flex; align-items: center; gap: .75rem; margin: .5rem 0; }
      .field label { flex: 0 0 8rem; text-align: right; color: #374151; }
      .field input { flex: 1; padding: .35rem .5rem; border: 1px solid #d1d5db; border-radius: .375rem; }
      .field input[readonly] { background: #f3f4f6; color: #6b7280; }
      .field select { flex: 1; padding: .35rem .5rem; border: 1px solid #d1d5db; border-radius: .375rem; background: #fff; }
      .field textarea { flex: 1; padding: .35rem .5rem; border: 1px solid #d1d5db; border-radius: .375rem; min-height: 5rem; resize: vertical; }
      .warning { color: #b45309; background: #fffbeb; border: 1px solid #fcd34d; padding: .5rem .75rem; border-radius: .375rem; }
      .alert { padding: .75rem 1rem; border-radius: .375rem; margin: .5rem 0; }
      .alert-info { color: #1e40af; background: #dbeafe; border: 1px solid #bfdbfe; }
      .alert-success { color: #166534; background: #dcfce7; border: 1px solid #bbf7d0; }
      .alert-warning { color: #b45309; background: #fffbeb; border: 1px solid #fcd34d; }
      .alert-danger { color: #991b1b; background: #fee2e2; border: 1px solid #fecaca; }
      .radio-group { display: flex; flex-direction: column; gap: .25rem; }
      .radio-group.radio-stacked { flex-direction: column; }
      .radio-option { display: flex; align-items: center; gap: .5rem; cursor: pointer; }
      .radio-option input[type="radio"] { flex: 0 0 auto; margin: 0; }
      .slider-value { min-width: 2.5rem; text-align: center; font-variant-numeric: tabular-nums; }
      .selections-group, .menu-group { display: flex; gap: .25rem; flex-wrap: wrap; }
      .selection-btn, .menu-btn { padding: .35rem .75rem; border: 1px solid #d1d5db; border-radius: .375rem; background: #fff; cursor: pointer; }
      .selection-btn.selected { background: #2563eb; color: #fff; border-color: #2563eb; }
      .selection-btn:disabled, .menu-btn:disabled { opacity: .5; cursor: not-allowed; }
      .labeled-value span { flex: 1; }
      /* Table */
      .table { width: 100%; border-collapse: collapse; margin: .5rem 0; }
      .table th, .table td { padding: .35rem .5rem; border: 1px solid #d1d5db; text-align: left; }
      .table th { background: #f9fafb; font-weight: 600; }
      .table tbody tr:hover { background: #f3f4f6; }
      .table-sortable:hover { background: #e5e7eb; }
      .table-row-remove { width: 2rem; text-align: center; }
      .remove-btn { background: none; border: none; color: #dc2626; cursor: pointer; font-size: 1rem; padding: 0 .25rem; }
      .table-add-btn { margin-top: .5rem; padding: .35rem .75rem; background: #2563eb; color: #fff; border: none; border-radius: .375rem; cursor: pointer; }
      .table-add-btn:hover { background: #1d4ed8; }
      .table-page-controls { display: flex; align-items: center; gap: .5rem; }
      .table-page-btn { padding: .25rem .5rem; border: 1px solid #d1d5db; border-radius: .375rem; background: #fff; cursor: pointer; }
      .table-page-btn:hover { background: #f3f4f6; }
      /* Checkbox-enabled */
      .checkbox-enabled input[type="text"] { margin-left: .5rem; }
      /* Input-time */
      .input-time input { flex: 1; padding: .35rem .5rem; border: 1px solid #d1d5db; border-radius: .375rem; }
      /* Chart & Calendar */
      .chart label, .calendar h3 { margin-bottom: .5rem; }
    </style>
  </head>
  <body>
    {{view|safe}}
  </body>
</html>
