<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}}</title>
    <!-- Datastar engine, vendored locally (see vendor-build/) — no CDN. -->
    <script type="module" src="/vendor/datastar.js"></script>
    <!-- Table widget DnD/scroll behaviour; each table fragment calls into it. -->
    <script src="/vendor/table.js"></script>
    <!-- Default theme. Widgets emit only HTML structure; all presentation is
         external CSS. A form view may layer its own theme on top via
         :opts {:theme "…"} (a /name, an absolute /path, or a full URL). -->
    <link rel="stylesheet" href="/css/stepvine.css">
    {% if app_css %}<!-- the app's own styling, served live from the store -->
    <link rel="stylesheet" href="{{app_css}}">{% endif %}
    {% if theme %}<link rel="stylesheet" href="{{theme}}">{% endif %}
  </head>
  <body>
    {{navbar|safe}}
    {% if multipage %}<!-- back/forward restores the page from its URL -->
    <div id="sv-history" data-on:popstate__window="window.location.reload()" hidden></div>{% endif %}
    {% if page_tabs %}{{page_tabs|safe}}{% endif %}
    <div id="sv-doc-body" class="sv-doc-body">{{view|safe}}</div>
    {% if page_nav %}{{page_nav|safe}}{% endif %}
    {{footer|safe}}
  </body>
</html>
